<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space 枫叶导航</title>
  <meta name="description" content="简洁科技感的网址导航页，含百度搜索与常用站点快捷入口。" />
  <style>
    :root {
      --bg: #1a315d;
      --bg-soft: rgba(255,255,255,0.12);
      --card: rgba(255, 255, 255, 0.10);
      --card-border: rgba(205, 228, 255, 0.24);
      --text: #fbfdff;
      --muted: #d7e1f0;
      --accent: #84c7ff;
      --accent-2: #92a2ff;
      --glow: rgba(132, 199, 255, 0.24);
      --shadow: 0 20px 46px rgba(6, 17, 40, 0.22);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 10%, rgba(169, 225, 255, 0.28), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(154, 169, 255, 0.18), transparent 24%),
        radial-gradient(circle at 50% -8%, rgba(230, 245, 255, 0.16), transparent 32%),
        linear-gradient(180deg, #27497f 0%, #213f72 42%, #19345f 100%);
      min-height: 100vh;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.16));
      pointer-events: none;
    }

    .grid-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0%, rgba(120, 210, 255, 0.05) 50%, transparent 100%),
        linear-gradient(180deg, transparent 0%, rgba(138, 114, 255, 0.04) 50%, transparent 100%);
      mix-blend-mode: screen;
    }

    .container {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 28px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero-logo {
      max-width: 760px;
      width: min(90vw, 760px);
      margin: 2px auto 12px;
      display: block;
      filter: drop-shadow(0 12px 28px rgba(72, 126, 215, 0.10));
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: 1px;
      display: none;
    }

    .hero p {
      display: none;
    }

    .search-wrap {
      margin: 30px auto 36px;
      max-width: 760px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.08));
      border: 1px solid var(--card-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .search-form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-form input {
      flex: 1 1 520px;
      min-width: 0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      background: rgba(255,255,255,0.10);
      color: var(--text);
      font-size: 16px;
      padding: 16px 18px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .search-form input::placeholder { color: #b2c8ea; }

    .search-form button {
      border: none;
      border-radius: 16px;
      padding: 0 26px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #6ab7ff, #8190ff);
      box-shadow: 0 8px 22px var(--glow);
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .category {
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.07));
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .category h2 {
      margin: 0 0 14px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category h2 span {
      display: inline-flex;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 10px var(--glow);
    }

    .links {
      display: grid;
      gap: 10px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      padding: 13px 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .link-item:hover {
      transform: translateY(-2px);
      border-color: rgba(132,199,255,0.32);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 10px 22px rgba(20, 52, 100, 0.14);
    }

    .link-main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .link-title {
      font-size: 15px;
      font-weight: 700;
    }

    .arrow {
      color: #b8c8e6;
      font-size: 18px;
      flex-shrink: 0;
    }

    footer {
      margin-top: 34px;
      text-align: center;
      color: rgba(245, 250, 255, 0.88);
      font-size: 14px;
      line-height: 1.8;
      letter-spacing: 0.2px;
    }

    .tip {
      margin-top: 10px;
      font-size: 12px;
      color: #7f95bd;
    }

    @media (max-width: 640px) {
      .container { padding: 28px 14px 22px; }
      .search-form button { width: 100%; min-height: 52px; }
    }
  </style>
</head>
